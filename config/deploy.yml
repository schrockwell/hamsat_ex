service: hamsat

image: schrockwell/hamsat

retain_containers: 1

servers:
  web:
    - hams.at

proxy:
  ssl: true
  host: hams.at
  app_port: 4000

volumes:
  - /root/mounts/hamsat/data:/app/data

env:
  clear:
    DATABASE_PATH: /app/data/hamsat_prod.db
    POOL_SIZE: 2
    PORT: 4000
    WEB_HOST: hams.at
  secret:
    - SSE_MASTER_KEY

registry:
  server: localhost:5555

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "/app/bin/hamsat remote"
  shell: app exec --interactive --reuse "/bin/bash"
  logs: app logs -f
